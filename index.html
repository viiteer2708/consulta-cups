<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CUPS — Mega Energía</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --accent: #10b981;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --gas: #f97316;
            --gas-light: #fff7ed;
            --elec: #2563eb;
            --elec-light: #eff6ff;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow-lg: 0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
        }

        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 50;
        }
        .header__brand { display: flex; align-items: center; gap: .75rem; font-weight: 700; font-size: 1.15rem; color: var(--primary); }
        .header__status { display: flex; align-items: center; gap: .5rem; font-size: .8rem; color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: background .3s; }
        .status-dot.ok { background: var(--accent); }

        .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

        .search-card {
            background: var(--surface); border-radius: var(--radius);
            box-shadow: var(--shadow-lg); padding: 2rem; margin-bottom: 2rem;
        }
        .search-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
        .search-card > p { color: var(--text-muted); font-size: .9rem; margin-bottom: 1.5rem; }

        /* Toggle buttons */
        .toggle-group {
            display: flex; border: 2px solid var(--border); border-radius: var(--radius); overflow: hidden;
        }
        .toggle-btn {
            padding: .7rem 1.2rem; border: none; background: var(--surface); color: var(--text-muted);
            font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s; flex: 1; text-align: center;
        }
        .toggle-btn:not(:last-child) { border-right: 2px solid var(--border); }
        .toggle-btn.active { background: var(--primary); color: #fff; }
        .toggle-btn.active.gas-active { background: var(--gas); }

        .search-row { display: flex; gap: .75rem; }
        .input-wrap { flex: 1; position: relative; }
        .input-wrap input {
            width: 100%; padding: .85rem 1rem .85rem 2.75rem;
            border: 2px solid var(--border); border-radius: var(--radius);
            font-size: 1rem; font-family: 'SF Mono','Cascadia Code','Consolas',monospace;
            letter-spacing: .02em; transition: border-color .2s, box-shadow .2s; outline: none; text-transform: uppercase;
        }
        .input-wrap input::placeholder { text-transform: none; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif; letter-spacing: 0; color: #94a3b8; }
        .input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .input-wrap .icon { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
            padding: .85rem 1.75rem; border: none; border-radius: var(--radius);
            font-size: .95rem; font-weight: 600; cursor: pointer;
            transition: background .2s, transform .1s, box-shadow .2s; white-space: nowrap;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: var(--shadow); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .type-badge {
            display: none; align-items: center; gap: .4rem; padding: .35rem .85rem;
            border-radius: 20px; font-size: .8rem; font-weight: 600; margin-top: 1rem;
        }
        .type-badge.show { display: inline-flex; }
        .type-badge.elec { background: var(--elec-light); color: var(--elec); }
        .type-badge.gas { background: var(--gas-light); color: var(--gas); }

        .loader { display: none; text-align: center; padding: 3rem 1rem; }
        .loader.show { display: block; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: var(--text-muted); font-size: .9rem; }

        .error-msg { display: none; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem 1.25rem; border-radius: var(--radius); font-size: .9rem; margin-bottom: 1.5rem; }
        .error-msg.show { display: flex; gap: .75rem; align-items: flex-start; }

        .results { display: none; }
        .results.show { display: block; animation: fadeUp .4s ease; }

        .section-title {
            font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
            color: var(--text-muted); margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: .75rem; margin-bottom: 2rem; }

        .data-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.25rem; transition: box-shadow .2s, transform .2s;
        }
        .data-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
        .data-card__label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: .4rem; }
        .data-card__value { font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.2; }
        .data-card__value small { font-size: .75rem; font-weight: 500; color: var(--text-muted); margin-left: .15rem; }
        .data-card__sub { font-size: .8rem; color: var(--text-muted); margin-top: .25rem; }

        .periods-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 2rem; }
        .periods-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
        .periods-table th {
            background: var(--bg); padding: .6rem .75rem; text-align: left;
            font-weight: 600; font-size: .7rem; text-transform: uppercase;
            letter-spacing: .04em; color: var(--text-muted); border-bottom: 1px solid var(--border);
        }
        .periods-table td { padding: .55rem .75rem; border-bottom: 1px solid var(--border); font-size: .8rem; }
        .periods-table tr:last-child td { border-bottom: none; }
        .periods-table tr:hover td { background: var(--bg); }
        .period-bar { height: 6px; border-radius: 3px; background: var(--primary); transition: width .6s ease; }
        .period-bar.gas { background: var(--gas); }

        /* Maximetros peak highlight */
        .maxi-peak { font-weight: 800; color: var(--danger); }

        @media (max-width: 600px) {
            .search-row { flex-direction: column; }
            .btn { width: 100%; }
            .search-card { padding: 1.25rem; }
            .search-card h1 { font-size: 1.25rem; }
            .main { padding: 1rem .75rem 3rem; }
            .card-grid { grid-template-columns: 1fr 1fr; }
            .data-card__value { font-size: 1.25rem; }
            .header__brand span { display: none; }
            .toggle-btn { padding: .6rem .5rem; font-size: .8rem; }
        }
        @media (max-width: 380px) { .card-grid { grid-template-columns: 1fr; } }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        @media print {
            .header, .search-card { break-inside: avoid; }
            .btn, .toggle-group { display: none; }
            body { background: #fff; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header__brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        <span>Consulta CUPS</span>
    </div>
    <div class="header__status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Conectando...</span>
    </div>
</header>

<main class="main">
    <div class="search-card">
        <h1>Consulta de CUPS</h1>
        <p>Introduce el código CUPS para obtener potencias, consumos y maxímetros</p>
        <div class="search-row">
            <div class="input-wrap">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="cupsInput" placeholder="ES0021000009693104NG" autocomplete="off" spellcheck="false" maxlength="25"/>
            </div>
            <div class="toggle-group" id="lineaToggle">
                <button class="toggle-btn active" data-value="electricidad">Electricidad</button>
                <button class="toggle-btn" data-value="gas">Gas</button>
            </div>
            <button class="btn btn-primary" id="searchBtn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                Consultar
            </button>
        </div>
        <div class="type-badge" id="typeBadge">
            <span id="typeBadgeText"></span>
        </div>
    </div>

    <div class="error-msg" id="errorMsg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText"></span>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p id="loaderText">Consultando SIPS...</p>
    </div>

    <div class="results" id="results">
        <div id="consumoSection">
            <div class="section-title">Consumo anual</div>
            <div class="card-grid" id="consumoCards"></div>
            <div id="periodosTableWrap"></div>
        </div>
        <div id="infoSection">
            <div class="section-title">Datos del punto de suministro</div>
            <div class="card-grid" id="infoCards"></div>
        </div>
        <div id="maximetrosSection">
            <div class="section-title">Maxímetros (últimos 12 meses)</div>
            <div id="maximetrosContent"></div>
        </div>
    </div>
</main>

<script>
(function () {
    'use strict';

    const $ = (s) => document.querySelector(s);
    const cupsInput = $('#cupsInput');
    const searchBtn = $('#searchBtn');
    const typeBadge = $('#typeBadge');
    const typeBadgeText = $('#typeBadgeText');
    const loader = $('#loader');
    const loaderText = $('#loaderText');
    const errorMsg = $('#errorMsg');
    const errorText = $('#errorText');
    const resultsEl = $('#results');
    const statusDot = $('#statusDot');
    const statusTextEl = $('#statusText');
    const lineaToggle = $('#lineaToggle');

    let selectedLinea = 'electricidad';

    // Toggle buttons
    lineaToggle.addEventListener('click', (e) => {
        const btn = e.target.closest('.toggle-btn');
        if (!btn) return;
        lineaToggle.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active', 'gas-active'));
        btn.classList.add('active');
        selectedLinea = btn.dataset.value;
        if (selectedLinea === 'gas') btn.classList.add('gas-active');
    });

    const TARIFAS = {
        1:'2.0A', 3:'2.0DHA', 4:'2.0DHS', 5:'2.1A', 7:'2.1DHA', 8:'2.1DHS',
        11:'3.0A', 12:'3.1A', 13:'6.1A', 14:'6.1B', 15:'6.2', 16:'6.3', 17:'6.4',
        18:'2.0TD', 19:'3.0TD', 20:'6.1TD', 21:'6.2TD', 22:'6.3TD', 23:'6.4TD',
        31:'RL.1', 32:'RL.2', 33:'RL.3', 34:'RL.4'
    };

    function fmt(n, dec = 2) {
        if (n == null || isNaN(n)) return '—';
        return new Intl.NumberFormat('es-ES', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n);
    }
    function wToKw(w) { return (w != null && !isNaN(w)) ? parseFloat(w) / 1000 : null; }
    function mwhToKwh(v) { return (v != null && !isNaN(v)) ? parseFloat(v) * 1000 : null; }

    // YYYY-MM-DD -> DD/MM/YYYY
    function fmtDate(d) {
        if (!d || d.length < 10) return d || '—';
        return d.substring(8, 10) + '/' + d.substring(5, 7) + '/' + d.substring(0, 4);
    }

    function showError(msg) { errorText.textContent = msg; errorMsg.classList.add('show'); }
    function hideError() { errorMsg.classList.remove('show'); }
    function setLoading(on, msg) {
        loader.classList.toggle('show', on);
        if (msg) loaderText.textContent = msg;
        resultsEl.classList.remove('show');
        searchBtn.disabled = on;
    }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    async function apiGet(endpoint, params) {
        const qs = new URLSearchParams(params);
        qs.set('endpoint', endpoint);
        const res = await fetch(`/api/proxy?${qs.toString()}`);
        if (!res.ok) throw new Error(`Error ${res.status}`);
        const data = await res.json();
        if (data && data.error && typeof data.error === 'string') return null;
        if (Array.isArray(data) && data.length === 0) return null;
        if (Array.isArray(data) && data.length === 1) return data[0];
        return data;
    }
    function safeGet(endpoint, params) { return apiGet(endpoint, params).catch(() => null); }

    function getTarifa(data) {
        const cod = data.codigoTarifaATREnVigor;
        if (cod != null) return TARIFAS[cod] || `Código ${cod}`;
        return null;
    }

    // -- Render: Info (Electricity) --
    function renderInfoElec(data) {
        const container = $('#infoCards');
        container.innerHTML = '';
        const priority = [];
        const rest = [];

        // Priority cards: BIE, Tarifa, Ultima Lectura
        const bieKw = wToKw(data.potenciaMaximaBIEW);
        if (bieKw != null && bieKw > 0) priority.push({ label: 'Potencia Máxima BIE', value: fmt(bieKw), unit: 'kW' });
        const tarifaLabel = getTarifa(data);
        if (tarifaLabel) priority.push({ label: 'Tarifa de Acceso', value: tarifaLabel, unit: '' });
        if (data.fechaUltimaLectura) priority.push({ label: 'Última Lectura', value: fmtDate(data.fechaUltimaLectura), unit: '' });

        // Potencias contratadas
        for (let i = 1; i <= 6; i++) {
            const kw = wToKw(data[`potenciasContratadasEnWP${i}`]);
            if (kw != null && kw > 0) rest.push({ label: `Potencia Contratada P${i}`, value: fmt(kw), unit: 'kW' });
        }
        if (data.nombreEmpresaDistribuidora) rest.push({ label: 'Distribuidora', value: data.nombreEmpresaDistribuidora, unit: '' });
        const tensionMap = { 1:'1x230', 2:'1x230', 3:'3x380', 4:'3x380', 5:'3x380/220', 6:'3x380/220' };
        if (data.codigoTensionV) rest.push({ label: 'Tensión', value: tensionMap[data.codigoTensionV] || `Cod. ${data.codigoTensionV}`, unit: 'V' });
        if (data.CNAE) rest.push({ label: 'CNAE', value: String(data.CNAE), unit: '' });

        renderCards(container, [...priority, ...rest]);
    }

    function renderInfoGas(data) {
        const container = $('#infoCards');
        container.innerHTML = '';
        const cards = [];
        const fieldMap = {
            nombreEmpresaDistribuidora: 'Distribuidora', codigoTarifaATREnVigor: 'Tarifa',
            caudalMaximoDiarioEnWhDia: 'Caudal Máx. Diario', caudalHorarioEnWh: 'Caudal Horario',
            codigoPostalPS: 'Código Postal', fechaUltimaLectura: 'Última Lectura',
            CNAE: 'CNAE', presionMedida: 'Presión Medida', codigoPeajeEnVigor: 'Peaje en Vigor'
        };
        Object.entries(fieldMap).forEach(([key, label]) => {
            if (data[key] != null && data[key] !== '' && data[key] !== 0) cards.push({ label, value: String(data[key]), unit: '' });
        });
        if (cards.length === 0) {
            Object.entries(data).forEach(([k, v]) => {
                if (k === '_id' || k === 'cups' || k === 'cups20' || v == null || v === '') return;
                cards.push({ label: k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()), value: String(v), unit: '' });
            });
        }
        renderCards(container, cards);
    }

    function renderCards(container, cards) {
        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'data-card';
            div.innerHTML = `<div class="data-card__label">${escapeHtml(c.label)}</div>
                <div class="data-card__value">${escapeHtml(c.value)}${c.unit ? `<small>${escapeHtml(c.unit)}</small>` : ''}</div>`;
            container.appendChild(div);
        });
    }

    // -- Render: Consumo anual --
    function renderConsumoAnual(data, tipo) {
        const container = $('#consumoCards');
        const tableWrap = $('#periodosTableWrap');
        container.innerHTML = '';
        tableWrap.innerHTML = '';

        const isMwh = (data.unidad || '').toLowerCase().includes('mwh');
        const totalRaw = data.consumoAnual ?? data.energiaActivaAnualTotal;
        const totalKwh = isMwh ? mwhToKwh(totalRaw) : parseFloat(totalRaw);

        if (totalKwh != null) {
            const div = document.createElement('div');
            div.className = 'data-card';
            div.style.gridColumn = '1 / -1';
            div.innerHTML = `
                <div class="data-card__label">Consumo Anual Total</div>
                <div class="data-card__value" style="font-size:2rem;color:var(--accent)">${fmt(totalKwh, 0)}<small>kWh</small></div>
                ${data.fechaInicio && data.fechaFin ? `<div class="data-card__sub">Periodo: ${fmtDate(data.fechaInicio)} → ${fmtDate(data.fechaFin)} (${data.diasTotales || 365} días)</div>` : ''}`;
            container.appendChild(div);
        }

        const periodos = [];
        for (let i = 1; i <= 6; i++) {
            const raw = data[`consumoAnualP${i}`] ?? data[`energiaActivaAnualP${i}`];
            if (raw != null && parseFloat(raw) > 0) {
                periodos.push({ periodo: `P${i}`, kwh: isMwh ? mwhToKwh(raw) : parseFloat(raw) });
            }
        }

        if (periodos.length > 0) {
            const totalPeriodos = periodos.reduce((s, p) => s + p.kwh, 0);
            const maxVal = Math.max(...periodos.map(p => p.kwh));
            const barClass = tipo === 'gas' ? 'gas' : '';
            let html = `<div class="periods-table-wrap"><table class="periods-table" style="table-layout:fixed;width:100%">
                <thead><tr><th style="width:50px">Periodo</th><th style="width:100px">Consumo</th><th style="width:50px">%</th><th>Distribución</th></tr></thead><tbody>`;
            periodos.forEach(p => {
                const pct = maxVal > 0 ? (p.kwh / maxVal * 100) : 0;
                const pctTotal = totalPeriodos > 0 ? (p.kwh / totalPeriodos * 100) : 0;
                html += `<tr>
                    <td><strong>${p.periodo}</strong></td>
                    <td>${fmt(p.kwh, 0)} kWh</td>
                    <td style="font-weight:600;color:var(--text-muted)">${fmt(pctTotal, 1)}%</td>
                    <td><div class="period-bar ${barClass}" style="width:${pct}%"></div></td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            tableWrap.innerHTML = html;
        }
    }

    // -- Render: Maximetros --
    function renderMaximetros(data) {
        const section = $('#maximetrosSection');
        const container = $('#maximetrosContent');
        container.innerHTML = '';

        let records = Array.isArray(data) ? data : [data];
        records = records.filter(r => r && r.cups);
        if (records.length === 0) { section.style.display = 'none'; return; }
        section.style.display = '';

        records.sort((a, b) => (b.fechaFinMesConsumo || '').localeCompare(a.fechaFinMesConsumo || ''));
        records = records.slice(0, 12);

        const activePeriods = [];
        for (let i = 1; i <= 6; i++) {
            if (records.some(r => r[`potenciaDemandadaEnWP${i}`] > 0)) activePeriods.push(i);
        }
        if (activePeriods.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted);font-size:.9rem">No se encontraron maxímetros con datos</p>';
            return;
        }

        // Find peak per period
        const peaks = {};
        activePeriods.forEach(i => {
            const key = `potenciaDemandadaEnWP${i}`;
            let maxVal = 0;
            records.forEach(r => { if ((r[key] || 0) > maxVal) maxVal = r[key]; });
            peaks[i] = maxVal;
        });

        // Table
        let html = `<div class="periods-table-wrap"><table class="periods-table" style="table-layout:fixed;width:100%">
            <thead><tr><th style="width:170px">Periodo facturación</th>`;
        activePeriods.forEach(i => { html += `<th style="text-align:center">P${i} (kW)</th>`; });
        html += '</tr></thead><tbody>';

        records.forEach(r => {
            const from = fmtDate(r.fechaInicioMesConsumo);
            const to = fmtDate(r.fechaFinMesConsumo);
            html += `<tr><td style="font-size:.78rem;color:var(--text)">${from} → ${to}</td>`;
            activePeriods.forEach(i => {
                const w = r[`potenciaDemandadaEnWP${i}`] || 0;
                const kw = wToKw(w);
                const isPeak = w > 0 && w === peaks[i];
                if (kw != null && kw > 0) {
                    html += `<td style="text-align:center" class="${isPeak ? 'maxi-peak' : ''}">${fmt(kw)}</td>`;
                } else {
                    html += '<td style="text-align:center;color:var(--border)">—</td>';
                }
            });
            html += '</tr>';
        });
        html += '</tbody></table></div>';

        // Potencia maxima por periodo
        html += '<div class="section-title" style="margin-top:1.5rem">Potencia máxima demandada (últimos 12 meses)</div><div class="card-grid">';
        activePeriods.forEach(i => {
            const maxKw = wToKw(peaks[i]);
            html += `<div class="data-card">
                <div class="data-card__label">Máxima P${i}</div>
                <div class="data-card__value" style="color:var(--danger)">${maxKw != null && maxKw > 0 ? fmt(maxKw) : '—'}<small>kW</small></div>
            </div>`;
        });
        html += '</div>';

        // Potencia media por periodo
        html += '<div class="section-title" style="margin-top:1rem">Potencia media demandada (últimos 12 meses)</div><div class="card-grid">';
        activePeriods.forEach(i => {
            const key = `potenciaDemandadaEnWP${i}`;
            const values = records.map(r => r[key] || 0).filter(v => v > 0);
            const avg = values.length > 0 ? values.reduce((a, b) => a + b, 0) / values.length : 0;
            const avgKw = wToKw(avg);
            html += `<div class="data-card">
                <div class="data-card__label">Media P${i}</div>
                <div class="data-card__value" style="color:var(--primary)">${avgKw != null && avgKw > 0 ? fmt(avgKw) : '—'}<small>kW</small></div>
            </div>`;
        });
        html += '</div>';

        container.innerHTML = html;
    }

    // -- Main search --
    async function search() {
        const cups = cupsInput.value.trim().toUpperCase().replace(/\s/g, '');
        if (!cups) return;

        hideError();
        setLoading(true, 'Consultando SIPS...');
        const linea = selectedLinea;

        try {
            const [infoData, consumoData, maxData] = await Promise.all([
                safeGet('sips/info', { cups }),
                safeGet('sips/consumo/anual', { linea, cups }),
                linea === 'electricidad' ? safeGet('sips/consumo', { linea, cups }) : Promise.resolve(null)
            ]);

            setLoading(false);

            if (!infoData && !consumoData && !maxData) {
                showError('No se encontraron datos para el CUPS introducido. Verifica que el código es correcto y que has seleccionado Electricidad o Gas correctamente.');
                return;
            }

            typeBadge.classList.add('show');
            typeBadge.classList.remove('elec', 'gas');
            typeBadge.classList.add(linea === 'gas' ? 'gas' : 'elec');
            typeBadgeText.textContent = linea === 'gas' ? 'Punto de Gas' : 'Punto de Electricidad';

            if (consumoData) { $('#consumoSection').style.display = ''; renderConsumoAnual(consumoData, linea); }
            else { $('#consumoSection').style.display = 'none'; }

            if (infoData) { $('#infoSection').style.display = ''; linea === 'gas' ? renderInfoGas(infoData) : renderInfoElec(infoData); }
            else { $('#infoSection').style.display = 'none'; }

            if (maxData && linea === 'electricidad') { renderMaximetros(maxData); }
            else { $('#maximetrosSection').style.display = 'none'; }

            resultsEl.classList.add('show');
        } catch (err) {
            setLoading(false);
            showError(err.message || 'Error desconocido');
        }
    }

    // -- Events --
    cupsInput.addEventListener('input', () => {
        const val = cupsInput.value.trim().toUpperCase().replace(/\s/g, '');
        searchBtn.disabled = !(val.length >= 20 && /^ES\d{4}/.test(val));
        typeBadge.classList.remove('show');
    });
    searchBtn.addEventListener('click', search);
    cupsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !searchBtn.disabled) search(); });

    fetch('/api/proxy?endpoint=sips/info&cups=test')
        .then(() => { statusDot.classList.add('ok'); statusTextEl.textContent = 'Conectado'; })
        .catch(() => { statusTextEl.textContent = 'Error de conexión'; });
})();
</script>
</body>
</html>
